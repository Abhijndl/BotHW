name: Hot Wheels Monitor

on:
  workflow_dispatch:   # run manually anytime from Actions tab
  schedule:
    # Every 30 minutes — change to "0 * * * *" for hourly if on free tier
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12   # kill runaway jobs to protect your free minutes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Cache the ~120MB Chromium download across runs.
      # We still run `playwright install` every time so system deps and the
      # executable are always present — it's a no-op when the cache is warm.
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-v3

      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # SILENT=true  → Telegram only when something changes (recommended)
          # SILENT=false → sends a summary every run
          SILENT: "true"
          # DEBUG=true  → sends screenshots to Telegram + saves HTML files
          # Set to true temporarily when diagnosing 0-product issues
          DEBUG: "false"
        run: python bot.py

      - name: Save state
        run: |
          if ! git diff --quiet -- seen.json; then
            git config user.name  "github-actions"
            git config user.email "actions@github.com"
            git add seen.json
            git commit -m "chore: update seen.json [skip ci]"
            git push
          fi
