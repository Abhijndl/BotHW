name: Hot Wheels Monitor

on:
  workflow_dispatch:        # lets you run it manually from the Actions tab
  schedule:
    # Every 15 minutes. Collector drops sell out fast, so tighter is better.
    # GitHub's free tier gives 2000 min/month for private repos (unlimited for
    # public). Each run here is ~20-40s, so 15-min cadence is safe. If you ever
    # get close to the cap, change to "*/30 * * * *".
    - cron: "*/15 * * * *"

permissions:
  contents: write           # needed so the job can commit seen.json back

# If a run is still going when the next fires, skip the new one instead of stacking.
concurrency:
  group: hw-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8      # kill runaway jobs to protect your free minutes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # NOTE: There is deliberately NO "playwright install chromium" step.
      # This bot uses plain HTTP (curl_cffi) and never launches a browser,
      # which is why it no longer hits the "chrome-headless-shell doesn't exist"
      # error and runs in seconds instead of minutes.

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # Minifygram: paste the site's PUBLIC Supabase anon key here (see README).
          # Without it, the bot tries to auto-discover it but Cloudflare may block
          # that from GitHub's IPs — so setting this secret is strongly recommended.
          MINIFYGRAM_ANON_KEY: ${{ secrets.MINIFYGRAM_ANON_KEY }}
          # Optional: watch specific Blinkit products. Paste share-links from the
          # Blinkit app, comma-separated. (Requires a non-blocked IP — GitHub's
          # US runners may 403; check the [BL] log lines to see.)
          BLINKIT_WATCH: "https://blinkit.com/prn/hot-wheels-164-scale-toy-car-colour-designs-may-vary-multicolour/prid/444563"
          # SILENT=true  → only ping Telegram on real changes (recommended)
          # SILENT=false → send a heartbeat summary every run
          SILENT: "true"
          # First run just learns the baseline instead of firing ~200 "new" alerts.
          FIRST_RUN_SILENT: "true"
          # Optional: only alert on NEW listings at/under this price (0 = no cap).
          # Handy to skip pricey track sets and focus on ₹100-300 singles.
          MAX_ALERT_PRICE: "0"
          # Optional: comma-separated keywords that get an extra 🎯 flag in alerts.
          WATCHLIST: "rlc,treasure hunt,team transport,car culture,boulevard"
          # DEBUG=true → also sends a heartbeat every run (use while setting up).
          DEBUG: "false"
        run: python bot.py

      - name: Save state
        run: |
          if ! git diff --quiet -- seen.json; then
            git config user.name  "github-actions"
            git config user.email "actions@github.com"
            git add seen.json
            git commit -m "chore: update seen.json [skip ci]"
            # Overlapping runs or manual edits can move main between our
            # checkout and push. Rebase onto the latest remote (keeping THIS
            # run's seen.json, which is the freshest full state) and retry.
            for attempt in 1 2 3; do
              if git push; then
                break
              fi
              echo "push rejected (attempt $attempt) — rebasing onto latest main"
              git fetch origin main
              git rebase -X theirs origin/main || { git rebase --abort; git reset --hard origin/main; break; }
            done
          fi
